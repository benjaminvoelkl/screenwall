<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Screenwall – Anzeige</title>
  <link rel="stylesheet" href="/css/screen.css" />
</head>
<body>
  <!-- Verbindungs-Overlay (wird bei WS-Abbruch eingeblendet) -->
  <div id="offline" class="offline hidden">Verbindung verloren – verbinde neu…</div>

  <!-- Inhalts-Bühne: zwei Crossfade-Slots (color/image/video/webpage/screenshare)
       plus eine persistente YouTube-Schicht (eigener IFrame-Player). -->
  <div id="stage" class="stage">
    <div class="layer slot" id="slot-0"></div>
    <div class="layer slot" id="slot-1"></div>
    <div class="layer yt-layer" id="yt-layer"><div id="yt-player"></div></div>
  </div>

  <!-- Willkommens-Overlay: liegt ÜBER dem Hintergrund (Dual-TV-Begrüßungsscreen). -->
  <div id="welcome" class="welcome-overlay hidden">
    <div class="wc-card">
      <div class="wc-headline" id="wc-headline"></div>
      <div class="wc-cols">
        <div class="wc-side wc-left">
          <img class="wc-logo hidden" id="wc-left-logo" alt="" />
          <div class="wc-text" id="wc-left-text"></div>
        </div>
        <div class="wc-gap"></div>
        <div class="wc-side wc-right">
          <img class="wc-logo hidden" id="wc-right-logo" alt="" />
          <div class="wc-text" id="wc-right-text"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/screen.js"></script>
</body>
</html>
