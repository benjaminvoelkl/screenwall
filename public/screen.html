<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Screenwall – Anzeige</title>
  <link rel="stylesheet" href="/css/screen.css" />
</head>
<body>
  <!-- Verbindungs-Overlay (wird bei WS-Abbruch eingeblendet) -->
  <div id="offline" class="offline hidden">Verbindung verloren – verbinde neu…</div>

  <!-- Modus 1: Diashow (eigene Crossfade-Lösung, keine externe Lib nötig) -->
  <section id="slideshow" class="layer slideshow hidden"></section>

  <!-- Willkommens-Overlay: liegt ÜBER der Diashow (Dual-TV-Begrüßungsscreen).
       Zentrierte Karte mit Blur-Hintergrund, links/rechts je Logo + Text,
       fester Abstand in der Mitte als Bezel-Schutzzone. -->
  <div id="welcome" class="welcome-overlay hidden">
    <div class="wc-card">
      <div class="wc-headline" id="wc-headline"></div>
      <div class="wc-cols">
        <div class="wc-side wc-left">
          <img class="wc-logo hidden" id="wc-left-logo" alt="" />
          <div class="wc-text" id="wc-left-text"></div>
        </div>
        <div class="wc-gap"></div>
        <div class="wc-side wc-right">
          <img class="wc-logo hidden" id="wc-right-logo" alt="" />
          <div class="wc-text" id="wc-right-text"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modus 2: YouTube -->
  <section id="youtube" class="layer youtube hidden">
    <div id="yt-player"></div>
  </section>

  <!-- Modus 3: Link – Webseite(n) im Vollbild -->
  <section id="link" class="layer link hidden">
    <iframe id="link-frame" allow="autoplay; fullscreen; encrypted-media"
      referrerpolicy="no-referrer"></iframe>
    <!-- Eingeblendet, wenn die Seite die Einbettung verbietet. -->
    <div id="link-notice" class="link-notice hidden">
      <div class="link-notice-box">
        <div class="link-notice-title">Diese Seite erlaubt keine Einbettung</div>
        <div class="link-notice-url" id="link-notice-url"></div>
      </div>
    </div>
  </section>

  <script src="/js/screen.js"></script>
</body>
</html>
