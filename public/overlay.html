<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Screenwall – Overlays</title>
  <link rel="stylesheet" href="/css/control.css" />
  <link rel="stylesheet" href="/css/overlay.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">
      <a class="back-link" href="/programm" title="Zur Programm-Timeline">← Programm</a>
      <h1>Overlays</h1>
    </div>
    <div class="topbar-actions">
      <button id="go-live" class="go-live hidden" title="Entwurf auf die Wand veröffentlichen">● Go Live</button>
    </div>
  </header>

  <main class="ed-layout">
    <aside class="ed-side">
      <!-- Overlay-Liste -->
      <div class="ed-box">
        <h3>Overlays</h3>
        <div id="ov-list" class="ed-list"></div>
        <button id="ov-add" class="btn">+ Overlay</button>
      </div>

      <!-- Eigenschaften des gewählten Overlays -->
      <div class="ed-box" id="ov-props-box" hidden>
        <h3>Overlay-Einstellungen</h3>
        <div id="ov-props"></div>
      </div>

      <!-- Elemente des gewählten Overlays -->
      <div class="ed-box" id="el-box" hidden>
        <h3>Elemente</h3>
        <div class="ed-row" style="margin-bottom:10px">
          <button class="btn tiny" data-add-el="text">+ Text</button>
          <button class="btn tiny" data-add-el="image">+ Bild</button>
          <button class="btn tiny" data-add-el="qr">+ QR-Code</button>
        </div>
        <div id="el-list" class="ed-list"></div>
        <div id="el-props"></div>
      </div>
    </aside>

    <section class="ed-main">
      <div id="ov-stage" class="ov-stage">
        <div id="ov-canvas" class="ov-canvas"></div>
      </div>
    </section>
  </main>

  <!-- versteckter Datei-Input für Bild-Upload eines Elements -->
  <input type="file" id="el-image-input" accept="image/*" hidden />

  <script src="/js/overlay.js"></script>
</body>
</html>
